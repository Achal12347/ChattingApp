name: chatly
description: A cross-platform chat app for Android and Web built with Flutter, Firebase, Riverpod, and Drift.
publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # --- State Management ---
  flutter_riverpod: ^2.5.1
  hooks_riverpod: ^2.5.1
  flutter_hooks: ^0.21.3

  # --- Firebase Core + Services ---
  firebase_core: ^4.0.0
  firebase_auth: ^6.0.1
  cloud_firestore: ^6.0.0
  firebase_storage: ^13.0.0
  firebase_messaging: ^16.0.0

  # --- Local Database (Drift) ---
  drift: ^2.10.0
  drift_flutter: ^0.2.5
  sqlite3: ^2.4.0
  sqlite3_flutter_libs: ^0.5.24

  # --- UI & Navigation ---
  cupertino_icons: ^1.0.8
  flutter_svg: ^2.0.10
  lottie: ^3.1.0
  animations: ^2.0.11
  google_fonts: ^6.3.0
  share_plus: ^11.1.0
  record: ^6.1.2
  audioplayers: ^6.5.0
  encrypt: ^5.0.3
  crypto: ^3.0.5

  # --- Authentication & Identity ---
  google_sign_in: ^7.1.1

  # --- QR Code ---
  qr_flutter: ^4.1.0
  mobile_scanner: ^3.5.6

  # --- Media Handling ---
  image_picker: ^1.1.2
  file_picker: ^10.3.1
  emoji_picker_flutter: ^2.0.0
  file_picker_desktop: ^1.0.0
  image_picker_windows: ^0.2.1

  # --- Utils & Helpers ---
  shared_preferences: ^2.3.2
  intl: ^0.20.2
  permission_handler: ^12.0.1
  path_provider: ^2.1.3
  path: ^1.9.0
  web: ^1.1.1
  uuid: ^4.5.1
  url_launcher: ^6.3.1
  connectivity_plus: ^6.1.0
  device_info_plus: ^11.5.0
  http: ^1.2.2

  # --- Notifications ---
  flutter_local_notifications: ^17.0.0
  badges: ^3.1.2
  image_cropper: ^9.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3

  # Drift codegen
  build_runner: ^2.4.0
  drift_dev: ^2.10.0

  # Testing
  mockito: ^5.4.4

flutter_launcher_icons:
  android: true
  ios: true
  web:
    generate: true
    image_path: "assets/icons/icon.png"
    background_color: "#ffffff"
    theme_color: "#ffffff"
  image_path: "assets/icons/icon.png"

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/icon.png
    - assets/fonts/
